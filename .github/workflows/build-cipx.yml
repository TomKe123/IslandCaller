name: Build CIPX

on:
  workflow_dispatch:
    inputs:
      push_to_release:
        description: "Push built CIPX to GitHub Release"
        required: false
        type: boolean
        default: false
      release_type:
        description: "Release type"
        required: false
        type: choice
        default: pre-release
        options:
          - pre-release
          - release
      release_tag:
        description: "Release tag (optional, auto-generated when empty)"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"
      - "2.*"

permissions:
  contents: write

jobs:
  build-cipx:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore plugin project
        run: dotnet restore IslandCaller.Plugin2/IslandCaller.Plugin2.csproj

      - name: Build plugin (Release)
        run: dotnet build IslandCaller.Plugin2/IslandCaller.Plugin2.csproj -c Release --no-restore

      - name: Create CIPX package
        run: dotnet publish IslandCaller.Plugin2/IslandCaller.Plugin2.csproj -c Release --no-restore -p:CreateCipx=true

      - name: Locate CIPX output
        id: locate_cipx
        shell: pwsh
        run: |
          Set-Location "$env:GITHUB_WORKSPACE"
          $cipxFiles = Get-ChildItem "IslandCaller.Plugin2" -Recurse -Filter "*.cipx" -File | Sort-Object LastWriteTime -Descending
          if ($cipxFiles.Count -eq 0) {
            Write-Host "No .cipx file found. Dumping directory tree for diagnostics..."
            Get-ChildItem "IslandCaller.Plugin2" -Recurse -File | Select-Object -First 300 | ForEach-Object { $_.FullName }
            throw "No .cipx file generated under IslandCaller.Plugin2"
          }

          $relativePaths = $cipxFiles | ForEach-Object {
            (Resolve-Path -Path $_.FullName -Relative).TrimStart('.','/','\\').Replace('\\', '/')
          }

          "files<<EOF" >> $env:GITHUB_OUTPUT
          $relativePaths | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

          "Detected CIPX files:"
          $relativePaths | ForEach-Object { "- $_" }

      - name: Upload CIPX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IslandCaller.Plugin2-cipx
          path: |
            IslandCaller.Plugin2/cipx/*.cipx
            IslandCaller.Plugin2/cipx/**/*.cipx
          if-no-files-found: error

      - name: Prepare release tag
        if: github.event_name == 'workflow_dispatch' && inputs.push_to_release
        id: prepare_release_tag
        shell: pwsh
        run: |
          if ("${{ inputs.release_tag }}" -ne "") {
            "tag=${{ inputs.release_tag }}" >> $env:GITHUB_OUTPUT
          }
          else {
            "tag=manual-cipx-${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Push CIPX to GitHub Release
        if: (github.event_name == 'workflow_dispatch' && inputs.push_to_release) || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release_tag.outputs.tag || github.ref_name }}
          name: ${{ steps.prepare_release_tag.outputs.tag || github.ref_name }}
          prerelease: ${{ inputs.release_type == 'pre-release' || false }}
          files: ${{ steps.locate_cipx.outputs.files }}
