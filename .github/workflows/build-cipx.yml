name: Build CIPX

on:
  workflow_dispatch:
    inputs:
      push_to_release:
        description: "Push built CIPX to GitHub Release"
        required: false
        type: boolean
        default: false
      release_type:
        description: "Release type"
        required: false
        type: choice
        default: pre-release
        options:
          - pre-release
          - release
      release_tag:
        description: "Release tag (optional, auto-generated when empty)"
        required: false
        type: string
        default: ""
  push:

permissions:
  contents: write

jobs:
  build-cipx:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore plugin project
        run: dotnet restore IslandCaller.Plugin2/IslandCaller.Plugin2.csproj

      - name: Build plugin (Release)
        run: dotnet build IslandCaller.Plugin2/IslandCaller.Plugin2.csproj -c Release --no-restore

      - name: Create CIPX package
        run: dotnet publish IslandCaller.Plugin2/IslandCaller.Plugin2.csproj -c Release --no-restore -p:CreateCipx=true

      - name: Upload CIPX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IslandCaller.Plugin2-cipx
          path: IslandCaller.Plugin2/cipx/IslandCaller.Plugin2.cipx
          compression-level: 0
          if-no-files-found: error

      - name: Prepare release tag
        if: github.event_name == 'workflow_dispatch' && inputs.push_to_release
        id: prepare_release_tag
        shell: pwsh
        run: |
          if ("${{ inputs.release_tag }}" -ne "") {
            "tag=${{ inputs.release_tag }}" >> $env:GITHUB_OUTPUT
          }
          else {
            "tag=manual-cipx-${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Push CIPX to GitHub Release
        if: (github.event_name == 'workflow_dispatch' && inputs.push_to_release) || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.prepare_release_tag.outputs.tag || github.ref_name }}
          name: ${{ steps.prepare_release_tag.outputs.tag || github.ref_name }}
          prerelease: ${{ inputs.release_type == 'pre-release' || false }}
          files: IslandCaller.Plugin2/cipx/IslandCaller.Plugin2.cipx
